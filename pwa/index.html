<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWA</title>

    <style>
      #errbox{
        position:fixed;left:0;right:0;bottom:0;
        max-height:45vh;overflow:auto;
        background:#111;color:#f66;font:12px/1.4 monospace;
        padding:10px;white-space:pre-wrap;z-index:99999
      }
    </style>

    <script>
      window.addEventListener("error", (e) => {
        const box = document.getElementById("errbox") || (() => {
          const d = document.createElement("div");
          d.id="errbox";
          document.body.appendChild(d);
          return d;
        })();
        box.textContent += "\n[ERROR] " + (e.message || e.error) + "\n" + (e.filename||"") + ":" + (e.lineno||"") + ":" + (e.colno||"") + "\n";
      });

      window.addEventListener("unhandledrejection", (e) => {
        const box = document.getElementById("errbox") || (() => {
          const d = document.createElement("div");
          d.id="errbox";
          document.body.appendChild(d);
          return d;
        })();
        box.textContent += "\n[REJECTION] " + (e.reason?.message || e.reason || "Promise rejeitada") + "\n";
      });
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
